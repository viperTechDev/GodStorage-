<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8d08a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="crossG1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d08a"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#7a6030"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg1)"/>
  <circle cx="50" cy="50" r="50" fill="url(#glow1)"/>
  <!-- Outer rings -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#7a6030" stroke-width="1"/>
  <circle cx="50" cy="50" r="40" fill="none" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="3 4"/>
  <!-- Ray lines -->
  <g stroke="#c9a84c" stroke-width="0.4" opacity="0.4">
    <line x1="50" y1="6" x2="50" y2="14"/>
    <line x1="50" y1="86" x2="50" y2="94"/>
    <line x1="6" y1="50" x2="14" y2="50"/>
    <line x1="86" y1="50" x2="94" y2="50"/>
    <line x1="17" y1="17" x2="22" y2="22"/>
    <line x1="78" y1="17" x2="83" y2="22"/>
    <line x1="17" y1="83" x2="22" y2="78"/>
    <line x1="78" y1="83" x2="83" y2="78"/>
  </g>
  <!-- Cross arms -->
  <rect x="44" y="22" width="12" height="56" rx="2" fill="url(#crossG1)"/>
  <rect x="22" y="44" width="56" height="12" rx="2" fill="url(#crossG1)"/>
  <!-- Center gem -->
  <circle cx="50" cy="50" r="7" fill="#0c1220" stroke="#c9a84c" stroke-width="1"/>
  <circle cx="50" cy="50" r="4" fill="#e8d08a"/>
</svg>
